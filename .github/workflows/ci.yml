name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff (fast lint)
        run: ruff check sonic/ mcp_runtime/ api/ tests/
      - name: pytest
        run: pytest -ra --cov=sonic --cov=mcp_runtime --cov-report=term-missing

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sonic-mcp-community-server:ci
      - name: Smoke test the built image
        # Start the container, wait for /health, tear it down.
        # No real switches available in CI — just prove it boots.
        run: |
          docker run -d --name mcp-smoke -p 18000:8000 \
            -e MCP_MUTATIONS_ENABLED=0 \
            sonic-mcp-community-server:ci
          # Poll /health for up to 20s
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:18000/health > /dev/null; then
              echo "container healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:18000/health
          curl -sf http://127.0.0.1:18000/tools | python3 -c "import json,sys; print(f'{len(json.load(sys.stdin))} tools loaded')"
          docker logs mcp-smoke | tail -30
          docker stop mcp-smoke
