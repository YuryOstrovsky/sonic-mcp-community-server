name: Release

# Triggered by pushing a semver-looking tag (e.g. v1.0.0, v2.1.3-rc1).
# Builds the Docker image and pushes it to ghcr.io/<owner>/<repo>:<tag>
# plus :latest when the tag is a final release (no -prerelease suffix).
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # needed to create the GitHub release + attach SBOM
  packages: write   # needed to push to ghcr.io
  id-token: write   # provenance attestation signing

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Tags produced:
          #   v1.2.3        → 1.2.3, 1.2, 1, latest (when final release)
          #   v1.2.3-rc1    → 1.2.3-rc1
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach an SBOM + build provenance attestation to the image so
          # downstream users can audit exactly what shipped.
          sbom: true
          provenance: mode=max

      - name: Generate SBOM artifact (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan pushed image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"          # a release should not ship known CRITICALs
          ignore-unfixed: true
          severity: CRITICAL

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom.spdx.json
