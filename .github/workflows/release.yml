name: Release

# Triggered by pushing a semver-looking tag (e.g. v1.0.0, v2.1.3-rc1).
# Builds the Docker image and pushes it to ghcr.io/<owner>/<repo>:<tag>
# plus :latest when the tag is a final release (no -prerelease suffix).
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # needed to create the GitHub release + attach SBOM
  packages: write   # needed to push to ghcr.io
  id-token: write   # provenance attestation signing

jobs:
  # Re-run the full quality gate on the tagged commit. A tag can be created
  # from a commit whose CI never ran (or failed), so a release must not be
  # able to bypass lint/tests/audit — the image job depends on this.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -r requirements-dev.txt
      - name: Ruff (fast lint)
        run: ruff check sonic/ mcp_runtime/ api/ tests/
      - name: pytest
        run: pytest -ra
      - name: Dependency audit
        run: pip-audit -r requirements.txt --strict

  image:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the same immutable tags to Docker Hub as well, so users who
      # pull extremecanada/... (per the README/compose) get exactly the image
      # tied to this GitHub release. Requires two repo secrets:
      #   DOCKERHUB_USERNAME  — a Docker Hub account with push to the org
      #   DOCKERHUB_TOKEN     — a Docker Hub access token (not the password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Same tag set is generated for every image listed here.
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/extremecanada/sonic-mcp-community-server
          # Tags produced:
          #   v1.2.3        → 1.2.3, 1.2, 1, latest (when final release)
          #   v1.2.3-rc1    → 1.2.3-rc1
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach an SBOM + build provenance attestation to the image so
          # downstream users can audit exactly what shipped.
          sbom: true
          provenance: mode=max

      - name: Generate SBOM artifact (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan pushed image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"          # a release should not ship known CRITICALs
          ignore-unfixed: true
          severity: CRITICAL

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: sbom.spdx.json
